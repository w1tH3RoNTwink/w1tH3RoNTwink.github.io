<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Надежный LAN Чат</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #1e1e1e;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 95vh;
            box-sizing: border-box;
        }
        h2 { margin: 5px 0; font-size: 1.2rem; text-align: center; }
        .section {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: #3d3d3d;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
            margin-top: 5px;
            padding: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.8; }
        #chat-area {
            flex-grow: 1;
            background: #252526;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .msg {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-word;
            font-size: 14px;
        }
        .msg.me { background: #007bff; align-self: flex-end; }
        .msg.other { background: #3a3a3c; align-self: flex-start; }
        .msg.system { background: transparent; color: #aaa; align-self: center; font-size: 12px; }
        #input-row { display: flex; gap: 5px; }
        #msg-input { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid #555; background: #3d3d3d; color: white; font-size: 16px; }
        #status { text-align: center; color: #ffc107; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>P2P LAN Чат</h2>
    <div id="status">Статус: Выберите роль</div>

    <div class="section" id="setup-block">
        <div id="step-1">
            <button id="btn-role-host" style="background:#28a745;">1. Я Создатель (Хост)</button>
            <button id="btn-role-client" style="background:#007bff;">1. Я Подключаюсь (Клиент)</button>
        </div>

        <div id="step-2" style="display:none;">
            <p id="setup-instruction" style="margin:5px 0; font-size:13px; color:#ffc107;"></p>
            <textarea id="token-output" readonly placeholder="Здесь появится ваш код..."></textarea>
            
            <p style="margin:15px 0 5px 0; font-size:13px;">Вставьте код от другого телефона сюда:</p>
            <textarea id="token-input" placeholder="Вставьте код сюда..."></textarea>
            <button id="btn-connect" style="background:#e0a800; color:black;">2. Подтвердить код</button>
        </div>
    </div>

    <div id="chat-area">
        <div class="msg system">Интерфейс готов к работе.</div>
    </div>

    <div id="input-row">
        <input type="text" id="msg-input" placeholder="Сообщение..." disabled>
        <button id="btn-send" style="width:auto; margin:0; padding:10px 15px;" disabled>➡️</button>
    </div>

<script>
    // Отключаем STUN серверы, работаем только локально
    let pc = new RTCPeerConnection({ iceServers: [] }); 
    let dataChannel = null;

    const statusDiv = document.getElementById('status');
    const chatArea = document.getElementById('chat-area');
    const msgInput = document.getElementById('msg-input');
    const btnSend = document.getElementById('btn-send');
    const tokenOutput = document.getElementById('token-output');
    const tokenInput = document.getElementById('token-input');

    // Клик по верхнему полю автоматически выделяет весь текст (удобно копировать на смартфонах)
    tokenOutput.addEventListener('click', function() {
        this.select();
        this.setSelectionRange(0, 99999);
    });

    // Роль ХОСТА
    document.getElementById('btn-role-host').onclick = async function() {
        showSetupStep2("Скопируйте код ниже (нажмите на него) и отправьте Клиенту:");
        
        try {
            dataChannel = pc.createDataChannel("chatChannel");
            setupDataChannelHandlers();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    tokenOutput.value = btoa(JSON.stringify(pc.localDescription));
                    statusDiv.innerText = "Статус: Код создан. Ожидание ответа.";
                }
            };
        } catch(err) {
            alert("Ошибка создания подключения: " + err.message);
        }
    };

    // Роль КЛИЕНТА
    document.getElementById('btn-role-client').onclick = function() {
        showSetupStep2("Вставьте код от Хоста в нижнее поле и нажмите Подтвердить:");
        
        pc.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannelHandlers();
        };
    };

    // Кнопка подтверждения
    document.getElementById('btn-connect').onclick = async function() {
        const rawToken = tokenInput.value.trim();
        if (!rawToken) {
            alert("Поле пустое! Вставьте текст.");
            return;
        }

        try {
            const parsedDesc = JSON.parse(atob(rawToken));
            await pc.setRemoteDescription(new RTCSessionDescription(parsedDesc));

            if (pc.remoteDescription.type === "offer") {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        tokenOutput.value = btoa(JSON.stringify(pc.localDescription));
                        statusDiv.innerText = "Статус: Отправьте ответный код Хосту!";
                        alert("Ответный код создан в верхнем поле! Передайте его Хосту.");
                    }
                };
            }
        } catch (err) {
            alert("Ошибка! Неверный код. Проверьте, что скопировали его целиком.");
        }
    };

    function setupDataChannelHandlers() {
        dataChannel.onopen = () => {
            statusDiv.innerText = "Подключено по локальной сети!";
            statusDiv.style.color = "#28a745";
            document.getElementById('setup-block').style.display = "none";
            msgInput.disabled = false;
            btnSend.disabled = false;
            logSystemMessage("Соединение установлено напрямую!");
        };

        dataChannel.onclose = () => {
            statusDiv.innerText = "Отключено";
            statusDiv.style.color = "#dc3545";
            msgInput.disabled = true;
            btnSend.disabled = true;
        };

        dataChannel.onmessage = (e) => {
            appendMessage(e.data, 'other');
        };
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !dataChannel || dataChannel.readyState !== "open") return;
        
        dataChannel.send(text);
        appendMessage(text, 'me');
        msgInput.value = "";
    }

    btnSend.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

    function showSetupStep2(instruction) {
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
        document.getElementById('setup-instruction').innerText = instruction;
        statusDiv.innerText = "Статус: Настройка токенов";
    }

    function appendMessage(text, side) {
        const el = document.createElement('div');
        el.classList.add('msg', side);
        el.innerText = text;
        chatArea.appendChild(el);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function logSystemMessage(text) {
        const el = document.createElement('div');
        el.classList.add('msg', 'system');
        el.innerText = text;
        chatArea.appendChild(el);
    }
</script>
</body>
</html>
