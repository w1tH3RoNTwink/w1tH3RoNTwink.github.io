<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>WithFruit Virtual Piano</title>
    <style>
        :root { 
            --bg: #090a0f; 
            --panel: #121420; 
            --accent: #ff4757; 
            --white-key: #f1f2f6;
            --black-key: #2f3542;
            --gray: #2f3542; 
            --text: #ffffff;
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        body { 
            margin: 0; 
            padding: 12px; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            user-select: none; 
            overflow: hidden; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--panel); 
            padding: 16px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            height: calc(100vh - 24px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 16px; 
        }
        h1 { margin: 0; font-size: 22px; letter-spacing: 1px; color: var(--accent); }
        .top-actions { display: flex; gap: 8px; }
        
        button, select { 
            background: var(--gray); 
            border: none; 
            color: #fff; 
            padding: 12px 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px; 
        }
        .metro-btn { background: #2ed573; }
        .metro-btn.active { background: #ff4757; }

        .piano-wrapper {
            flex-grow: 1;
            background: #000;
            border-radius: 14px;
            padding: 8px;
            display: flex;
            position: relative;
            min-height: 0;
            overflow-x: auto;
            align-items: stretch;
        }
        .piano-keys {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .key {
            flex: 1;
            position: relative;
            background: var(--white-key);
            border: 1px solid #dcdde1;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 16px;
            color: #57606f;
            font-size: 12px;
            font-weight: bold;
            z-index: 1;
            transition: background 0.1s;
        }
        .key.black {
            background: var(--black-key);
            border: 1px solid #000;
            height: 60%;
            margin-left: -3.5%;
            margin-right: -3.5%;
            z-index: 2;
            color: #a4b0be;
            border-radius: 0 0 4px 4px;
        }
        .key:active, .key.pressed {
            background: var(--accent) !important;
            color: #fff !important;
            padding-bottom: 10px;
        }
        body.phone-mode .key {
            font-size: 0 !important;
            padding-bottom: 24px;
        }
        body.phone-mode .key.black {
            height: 55%;
        }
        .bottom-panel { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; 
            background: rgba(0,0,0,0.3); 
            padding: 14px; 
            border-radius: 14px; 
            margin-top: 16px; 
        }
        .group { display: flex; flex-direction: column; gap: 4px; }
        .group label { font-size: 11px; text-transform: uppercase; color: #a4b0be; font-weight: bold; }
        
        input[type="range"] { 
            -webkit-appearance: none; 
            background: var(--gray); 
            height: 6px; 
            border-radius: 3px; 
            outline: none; 
            margin: 6px 0; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            background: var(--accent); 
            cursor: pointer; 
        }
    </style>
</head>
<body class="pc-mode">
<div class="container">
    <div class="header">
        <h1>WithFruit Piano</h1>
        <div class="top-actions">
            <button id="modeBtn">💻 Режим: ПК</button>
            <select id="instSelect">
                <option value="piano">🎹 Акустическое Пианино</option>
                <option value="synth">🔮 Космический Синтезатор</option>
                <option value="organ">🎚️ Электроорган</option>
            </select>
            <button id="metroBtn" class="metro-btn">⏱️ Метроном</button>
        </div>
    </div>
    <div class="piano-wrapper">
        <div class="piano-keys" id="pianoKeysContainer"></div>
    </div>
    <div class="bottom-panel">
        <div class="group">
            <label>Темп метронома: <span id="bpmVal">120</span> BPM</label>
            <input type="range" id="bpmInput" min="30" max="240" value="120">
        </div>
        <div class="group">
            <label>Тюн (Питч): <span id="tuneVal">0</span> центов</label>
            <input type="range" id="tuneInput" min="-500" max="500" value="0" step="50">
        </div>
        <div class="group">
            <label>Delay (Эхо): <span id="delVal">0%</span></label>
            <input type="range" id="delInput" min="0" max="100" value="20">
        </div>
        <div class="group">
            <label>Reverb (Объем): <span id="revVal">0%</span></label>
            <input type="range" id="revInput" min="0" max="100" value="30">
        </div>
    </div>
</div>
<script>
    var audioCtx = null;
    var mainOutput = null;
    var delayNode = null;
    var delayGain = null;
    var reverbNode = null;
    var reverbGain = null;
    
    var isPhoneMode = false;
    var isMetroPlaying = false;
    var metroTimer = null;
    var currentBpm = 120;
    var globalTune = 0;

    var instrumentFx = {
        piano: { delay: 10, reverb: 40 },
        synth: { delay: 50, reverb: 60 },
        organ: { delay: 0, reverb: 20 }
    };

    var NOTES = [
        { name: "До",  freq: 261.63, key: "1", black: false },
        { name: "До#", freq: 277.18, key: "2", black: true  },
        { name: "Ре",  freq: 293.66, key: "3", black: false },
        { name: "Ре#", freq: 311.13, key: "4", black: true  },
        { name: "Ми",  freq: 329.63, key: "5", black: false },
        { name: "Фа",  freq: 349.23, key: "6", black: false },
        { name: "Фа#", freq: 369.99, key: "7", black: true  },
        { name: "Соль", freq: 392.00, key: "8", black: false },
        { name: "Соль#",freq: 415.30, key: "9", black: true  },
        { name: "Ля",  freq: 440.00, key: "0", black: false },
        { name: "Ля#", freq: 466.16, key: "-", black: true  },
        { name: "Си",  freq: 493.88, key: "=", black: false },
        
        { name: "До2", freq: 523.25, key: "q", black: false },
        { name: "До#2",freq: 554.37, key: "w", black: true  },
        { name: "Ре2", freq: 587.33, key: "e", black: false },
        { name: "Ре#2",freq: 622.25, key: "r", black: true  },
        { name: "Ми2", freq: 659.25, key: "t", black: false },
        { name: "Фа2", freq: 698.46, key: "y", black: false },
        { name: "Фа#2",freq: 739.99, key: "u", black: true  },
        { name: "Соль2",freq: 783.99, key: "i", black: false },
        { name: "Соль#2",freq: 830.61, key: "o", black: true  },
        { name: "Ля2", freq: 880.00, key: "p", black: false },
        { name: "Ля#2",freq: 932.33, key: "[", black: true  },
        { name: "Си2", freq: 987.77, key: "]", black: false }
    ];

    function initAudio() {
        if (audioCtx) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return;
        }
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainOutput = audioCtx.createGain();
        mainOutput.gain.value = 0.7;
        mainOutput.connect(audioCtx.destination);
        
        delayNode = audioCtx.createDelay(1.0);
        delayNode.delayTime.value = 0.35;
        delayGain = audioCtx.createGain();
        
        delayNode.connect(delayGain);
        delayGain.connect(mainOutput);
        delayGain.connect(delayNode); 
        
        reverbNode = audioCtx.createConvolver();
        reverbNode.buffer = generateReverbImpulse(1.8, 2.2);
        reverbGain = audioCtx.createGain();
        
        reverbNode.connect(reverbGain);
        reverbGain.connect(mainOutput);
        
        updateFxSliders();
    }

    function generateReverbImpulse(duration, decay) {
        var sampleRate = audioCtx ? audioCtx.sampleRate : 44100;
        var length = sampleRate * duration;
        var impulse = audioCtx.createBuffer(2, length, sampleRate);
        for (var channel = 0; channel < 2; channel++) {
            var channelData = impulse.getChannelData(channel);
            for (var i = 0; i < length; i++) {
                channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
            }
        }
        return impulse;
    }

    function updateFxSliders() {
        var currentInst = document.getElementById('instSelect').value;
        var fx = instrumentFx[currentInst];
        
        document.getElementById('delInput').value = fx.delay;
        document.getElementById('delVal').innerText = fx.delay + "%";
        document.getElementById('revInput').value = fx.reverb;
        document.getElementById('revVal').innerText = fx.reverb + "%";
        
        if (delayGain) {
            delayGain.gain.setValueAtTime((fx.delay / 100) * 0.5, audioCtx.currentTime);
        }
        if (reverbGain) {
            reverbGain.gain.setValueAtTime((fx.reverb / 100) * 0.6, audioCtx.currentTime);
        }
    }
</script>
<script>
    function buildPiano() {
        var container = document.getElementById('pianoKeysContainer');
        container.innerHTML = '';
        
        NOTES.forEach(function(note, index) {
            var keyDiv = document.createElement('div');
            keyDiv.className = 'key' + (note.black ? ' black' : '');
            keyDiv.id = 'piano-key-' + index;
            keyDiv.innerHTML = '<span>' + note.name + '<br><small>[' + note.key + ']</small></span>';
            
            keyDiv.addEventListener('mousedown', function() {
                initAudio();
                pressNote(index);
            });
            keyDiv.addEventListener('touchstart', function(e) {
                initAudio();
                pressNote(index);
                e.preventDefault();
            }, {passive: false});
            
            container.appendChild(keyDiv);
        });
    }

    function pressNote(index) {
        var note = NOTES[index];
        var type = document.getElementById('instSelect').value;
        var targetFreq = note.freq * Math.pow(2, globalTune / 1200);
        var oscGain = audioCtx.createGain();
        oscGain.connect(mainOutput);
        oscGain.connect(delayNode);
        oscGain.connect(reverbNode);

        var el = document.getElementById('piano-key-' + index);
        if (el) {
            el.classList.add('pressed');
            setTimeout(function() {
                el.classList.remove('pressed');
            }, 200);
        }

        if (type === 'piano') {
            var o1 = audioCtx.createOscillator();
            var o2 = audioCtx.createOscillator();
            o1.type = 'sine'; 
            o1.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
            o2.type = 'triangle'; 
            o2.frequency.setValueAtTime(targetFreq * 2, audioCtx.currentTime);
            
            oscGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            
            o1.connect(oscGain); o2.connect(oscGain);
            o1.start(); o2.start();
            o1.stop(audioCtx.currentTime + 1.3); o2.stop(audioCtx.currentTime + 1.3);
            
        } else if (type === 'synth') {
            var o = audioCtx.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
            oscGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            o.connect(oscGain);
            o.start();
            o.stop(audioCtx.currentTime + 0.65);
            
        } else if (type === 'organ') {
            var o1 = audioCtx.createOscillator();
            var o2 = audioCtx.createOscillator();
            o1.type = 'square'; 
            o1.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
            o2.type = 'square'; 
            o2.frequency.setValueAtTime(targetFreq * 1.5, audioCtx.currentTime);
            
            oscGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            
            o1.connect(oscGain); o2.connect(oscGain);
            o1.start(); o2.start();
            o1.stop(audioCtx.currentTime + 0.85); o2.stop(audioCtx.currentTime + 0.85);
        }
    }

    function playMetroTick() {
        if (!isMetroPlaying || !audioCtx) return;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.06);
        metroTimer = setTimeout(playMetroTick, (60 / currentBpm) * 1000);
    }
</script>
<script>
    window.addEventListener('DOMContentLoaded', function() {
        buildPiano();

        window.addEventListener('keydown', function(e) {
            var keyStr = e.key.toLowerCase();
            var index = -1;
            for (var i = 0; i < NOTES.length; i++) {
                if (NOTES[i].key === keyStr) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                initAudio();
                pressNote(index);
            }
        });

        document.getElementById('modeBtn').addEventListener('click', function() {
            isPhoneMode = !isPhoneMode;
            if (isPhoneMode) {
                document.body.className = "phone-mode";
                this.innerText = "📱 Режим: Телефон";
                this.style.background = "var(--accent)";
            } else {
                document.body.className = "pc-mode";
                this.innerText = "💻 Режим: ПК";
                this.style.background = "var(--gray)";
            }
        });

        document.getElementById('instSelect').addEventListener('change', function() {
            if (audioCtx) {
                updateFxSliders();
            }
        });

        document.getElementById('metroBtn').addEventListener('click', function() {
            initAudio();
            isMetroPlaying = !isMetroPlaying;
            if (isMetroPlaying) {
                this.classList.add('active');
                playMetroTick();
            } else {
                this.classList.remove('active');
                clearTimeout(metroTimer);
            }
        });

        document.getElementById('bpmInput').addEventListener('input', function(e) {
            currentBpm = parseInt(e.target.value);
            document.getElementById('bpmVal').innerText = currentBpm;
        });

        document.getElementById('tuneInput').addEventListener('input', function(e) {
            globalTune = parseInt(e.target.value);
            document.getElementById('tuneVal').innerText = globalTune > 0 ? "+" + globalTune : globalTune;
        });

        document.getElementById('delInput').addEventListener('input', function(e) {
            initAudio();
            var val = parseInt(e.target.value);
            var inst = document.getElementById('instSelect').value;
            instrumentFx[inst].delay = val;
            document.getElementById('delVal').innerText = val + "%";
            delayGain.gain.setValueAtTime((val / 100) * 0.5, audioCtx.currentTime);
        });

        document.getElementById('revInput').addEventListener('input', function(e) {
            initAudio();
            var val = parseInt(e.target.value);
            var inst = document.getElementById('instSelect').value;
            instrumentFx[inst].reverb = val;
            document.getElementById('revVal').innerText = val + "%";
            reverbGain.gain.setValueAtTime((val / 100) * 0.6, audioCtx.currentTime);
        });
    });
</script>
</body>
    </html>
